baseurl = "https://prokopto.dev/"
title = "Courtney C."
theme = "hugo-coder"
languagecode = "en"
defaultcontentlanguage = "en"

paginate = 20

disqusShortname = "yourdiscussshortname"

[markup.highlight]
style = "github-dark"

[params]
  author = "Courtney C."
  info = "(Currently) Independent Research and Developer"
  description = "Personal website of science, philosophy, and general-knowledge nerd Courtney C."
  keywords = "blog,developer,personal,student,academic,academia"
  avatarurl = "images/avatar.jpg"
  #gravatar = "public@public.pub"

  faviconSVG = "/img/favicon.svg"
  favicon_32 = "/img/favicon-32x32.png"
  favicon_16 = "/img/favicon-16x16.png"

  since = 2023

  enableTwemoji = true

  colorScheme = "auto"
  hidecolorschemetoggle = false

  # customCSS = ["css/custom.css"]
  # customSCSS = ["scss/custom.scss"]
  # customJS = ["js/custom.js"]

[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"
  author = "authors"

